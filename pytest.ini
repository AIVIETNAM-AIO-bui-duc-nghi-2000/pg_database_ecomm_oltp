[pytest]
# 1. Terminal Output Configuration
# -v: Verbose (show detailed test results)
# -s: Disable output capturing (print statements will show in terminal)
# --junitxml: Generates a standard XML report file for CI/CD tools
addopts = -v -s --junitxml=logs/test_report.xml

# 2. Log Formatting Configuration (Live Terminal Output)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 3. File Logging Configuration (Native Pytest Configuration)
# This logs everything (including detailed DEBUG logs) into a single file
log_file = logs/pipeline_tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S

# 4. Test Discovery (Where should pytest look for tests)
# Setting this to 'tests' ensures it scans the entire tests directory, 
# including any subfolders like 'unit' or 'integration' if you create them.
testpaths = tests